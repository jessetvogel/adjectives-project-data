type: morphism
name: $\Spec \QQ[x,y]/(x,y)^2 \to \Spec \QQ$
description: The structure morphism of the scheme $\Spec \QQ[x,y]/(x^2,xy,y^2)$.

with:
  source: rank-3-fat-point
  target: Spec-QQ

adjectives:
  finite-locally-free: [true, "The algebra $\\QQ[x,y]/(x^2,xy,y^2)$ is a free $\\QQ$-vector space with basis $1,x,y$."]
  homeomorphism: [true, "Both the source and target consist of a single point."]
  syntomic: [false, "Over a field, syntomic is equivalent to being a local complete intersection. The ideal $(x^2,xy,y^2) \\subset \\QQ[x,y]_{(x,y)}$ has height $2$, but it requires $3$ generators, so it is not generated by a regular sequence."]
